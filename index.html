<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAS Advanced Moodle Builder (Google Drive)</title>
<style>
body{font-family:Arial;background:#f5f4f0;margin:0}
header{background:#fff;padding:10px 20px;border-bottom:1px solid #ddd;font-weight:bold}
.layout{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 48px)}
.left{padding:15px;background:#fff;border-right:1px solid #ddd;overflow:auto}
.right{padding:15px;display:flex;flex-direction:column;gap:10px}
textarea,input,select{width:100%;padding:6px;margin-bottom:8px}
.card{background:#fff;border:1px solid #ddd;border-radius:6px}
.card h3{margin:0;padding:8px;border-bottom:1px solid #eee;font-size:12px}
.card-body{padding:10px}
.btn{background:#1a4fd8;color:#fff;border:none;padding:6px 12px;cursor:pointer;margin-top:5px}
.img-list{display:flex;flex-direction:column;gap:6px}
.img-item{background:#eee;padding:6px;cursor:pointer}
</style>
</head>
<body>
<header>SEAS Advanced Builder (Google Drive)</header>
<div class="layout">

<div class="left">
<label>Question</label>
<textarea id="qtext"></textarea>

<label>Add Google Drive Image</label>
<input type="text" id="imginput" placeholder="Paste Drive link">
<button class="btn" onclick="addImage()">Add Image</button>

<div class="img-list" id="imgList"></div>

<label>Table Rows</label>
<input type="number" id="rows" value="3">
<label>Table Columns</label>
<input type="number" id="cols" value="3">
<button class="btn" onclick="generateTable()">Insert Table</button>

<button class="btn" onclick="update()">Generate HTML</button>
</div>

<div class="right">
<div class="card">
<h3>Preview</h3>
<div class="card-body" id="preview"></div>
</div>

<div class="card">
<h3>HTML Output</h3>
<div class="card-body">
<textarea id="output" rows="10"></textarea>
<button class="btn" onclick="copyCode()">Copy</button>
</div>
</div>
</div>

</div>

<script>
let images=[];
let tableHTML='';

function convert(url){
 let m=url.match(/\/file\/d\/([^\/]+)/);
 return m?`https://drive.google.com/thumbnail?id=${m[1]}`:url;
}

function addImage(){
 let url=document.getElementById('imginput').value;
 if(!url)return;
 url=convert(url);
 images.push(url);
 renderImages();
 document.getElementById('imginput').value='';
}

function renderImages(){
 let list=document.getElementById('imgList');
 list.innerHTML='';
 images.forEach((img,i)=>{
 let div=document.createElement('div');
 div.className='img-item';
 div.innerText='Image '+(i+1);
 div.onclick=()=>{images.splice(i,1);renderImages();};
 list.appendChild(div);
 });
}

function generateTable(){
 let r=document.getElementById('rows').value;
 let c=document.getElementById('cols').value;
 let t='<table border="1" style="border-collapse:collapse;width:100%">';
 for(let i=0;i<r;i++){
 t+='<tr>';
 for(let j=0;j<c;j++){
 t+='<td style="padding:6px">&nbsp;</td>';
 }
 t+='</tr>';
 }
 t+='</table>';
 tableHTML=t;
}

function update(){
 let q=document.getElementById('qtext').value;
 let html='';

 if(q) html+=`<p>${q}</p>`;

 images.forEach(img=>{
 html+=`<div style="text-align:center;margin:10px 0">
<img src="${img}" style="max-width:400px;height:auto;display:block;margin:auto" />
</div>`;
 });

 if(tableHTML) html+=tableHTML;

 document.getElementById('preview').innerHTML=html;
 document.getElementById('output').value=html;
}

function copyCode(){
 let t=document.getElementById('output');
 t.select();
 document.execCommand('copy');
}
</script>

</body>
</html>
